name: Feature request
description: Suggest a new capability for pyhusqvarna or the HA integration
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the library makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: |
        How would you like this to work? Mention any cloud endpoint
        or WebSocket payload that's relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Workarounds you've tried, or alternative API shapes you
        thought about and rejected.
